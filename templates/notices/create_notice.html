{% extends 'base.html' %}

{% block title %}Create Notice{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-plus"></i> Post New Notice</h2>
    <a href="{% url 'notices:list' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <i class="fas fa-edit"></i> Notice Details
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">
                            Title <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="title" class="form-control" placeholder="Enter notice title" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            Content <span class="text-danger">*</span>
                        </label>
                        <textarea name="content" class="form-control" rows="8" placeholder="Enter notice content..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            Target Audience <span class="text-danger">*</span>
                        </label>
                        <select name="target_audience" class="form-select" required>
                            <option value="">-- Select Audience --</option>
                            <option value="all">All (Students & Teachers)</option>
                            <option value="students">Students Only</option>
                            <option value="teachers">Teachers Only</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            Attachment (Optional)
                        </label>
                        <input type="file" name="file" class="form-control">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Post Notice
                    </button>
                    <a href="{% url 'notices:list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-info text-white">
                <i class="fas fa-lightbulb"></i> Tips
            </div>
            <div class="card-body">
                <ul class="list-unstyled">
                    <li class="mb-2">
                        <i class="fas fa-check text-success"></i> Use clear titles
                    </li>
                    <li class="mb-2">
                        <i class="fas fa-check text-success"></i> Be concise
                    </li>
                    <li class="mb-2">
                        <i class="fas fa-check text-success"></i> Include important dates
                    </li>
                    <li class="mb-2">
                        <i class="fas fa-check text-success"></i> Choose right audience
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
