{% extends 'base.html' %}

{% block title %}Create Timetable Slot{% endblock %}

{% block content %}
<h2><i class="fas fa-plus"></i> Create Timetable Slot</h2>

<div class="row mt-4">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Day</label>
                            <select name="day" class="form-select" required>
                                <option value="monday">Monday</option>
                                <option value="tuesday">Tuesday</option>
                                <option value="wednesday">Wednesday</option>
                                <option value="thursday">Thursday</option>
                                <option value="friday">Friday</option>
                                <option value="saturday">Saturday</option>
                            </select>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <label>Start Time</label>
                            <input type="time" name="start_time" class="form-control" required>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <label>End Time</label>
                            <input type="time" name="end_time" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Course</label>
                            <select name="course" class="form-select" required>
                                <option value="">Select Course</option>
                                {% for course in courses %}
                                <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label>Teacher</label>
                            <select name="teacher" class="form-select" required>
                                <option value="">Select Teacher</option>
                                {% for teacher in teachers %}
                                <option value="{{ teacher.id }}">{{ teacher.user.get_full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Department</label>
                            <select name="department" class="form-select" required>
                                <option value="">Select Department</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}">{{ dept.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label>Year</label>
                            <input type="number" name="year" class="form-control" min="1" max="4" required>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label>Semester</label>
                            <input type="number" name="semester" class="form-control" min="1" max="8" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label>Room Number</label>
                            <input type="text" name="room_number" class="form-control" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Create Timeslot
                    </button>
                    <a href="{% url 'timetable:view' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
